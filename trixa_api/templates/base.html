<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Trixa{% endblock %}</title>
  <!-- Tropical theme (replaces Pico). Serve trixa.css from your static dir. -->
  <link rel="stylesheet" href="/static/trixa.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  {% block head %}{% endblock %}
</head>
<body>
  {% set path = request.url.path if request else "" %}
  <nav>
    <ul>
      <li><a href="/"><span class="brand-ic"><i data-lucide="flower-2"></i></span>Trixa</a></li>
      <li><a href="/ui/" class="{{ 'active' if path == '/ui/' }}">Hem</a></li>
      <li><a href="/ui/data" class="{{ 'active' if path == '/ui/data' }}">Nyckeltal</a></li>
      <li><a href="/ui/report" class="{{ 'active' if path == '/ui/report' }}">Veckorapport</a></li>
      <li><a href="/ui/health" class="{{ 'active' if path == '/ui/health' }}">Hälsa</a></li>
      <li><a href="/ui/settings" class="{{ 'active' if path == '/ui/settings' }}">Inställningar</a></li>
    </ul>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    Trixa — din triathlontränare.
  </footer>
  <script>lucide.createIcons();</script>
</body>
</html>
