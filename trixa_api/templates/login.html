{% extends "base.html" %}
{% block title %}Logga in — Trixa{% endblock %}
{% block content %}
<section style="max-width: 420px; margin: 6vh auto 0;">
  <h1 style="font-size: 2.1rem;">Logga in</h1>
  <article>
    {% if error %}
    <p style="color: var(--coral); margin: 0 0 14px; font-weight: 600;">{{ error }}</p>
    {% endif %}
    <form method="post" action="/ui/login">
      <label>E-post
        <input type="email" name="email" required autofocus autocomplete="email"
               placeholder="din@epost.se">
      </label>
      <label>Lösenord
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <button type="submit" style="width: 100%;">Logga in</button>
    </form>
  </article>
  <p style="font-size: 12.5px; color: var(--ink-3); text-align: center;">
    Trixa använder ditt befintliga konto. Hör av dig till din coach om du behöver hjälp in.
  </p>
</section>
{% endblock %}
