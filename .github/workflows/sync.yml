name: Garmin Sync

on:
  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Vad ska synkas'
        type: choice
        required: true
        default: 'daily'
        options:
          - daily
          - activities
          - profile
          - full
      days:
        description: 'Antal dagar bakat (for daily/full)'
        required: false
        default: '1'
      activities_limit:
        description: 'Antal aktiviteter (for activities/full)'
        required: false
        default: '20'

  schedule:
    - cron: '30 5 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garmin-mcp

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: garmin-mcp/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Garmin tokens
        env:
          GARMIN_TOKENS_JSON: ${{ secrets.GARMIN_TOKENS_JSON }}
        run: |
          set -e
          mkdir -p ~/.garminconnect
          if [ -z "$GARMIN_TOKENS_JSON" ]; then
            echo "::error::GARMIN_TOKENS_JSON saknas. Kor scripts/setup_github_secrets.ps1 lokalt."
            exit 1
          fi
          # Skriv tokens via Python - undviker shell-quoting och printf-quirks
          python <<'PY'
          import json, os, sys
          raw = os.environ["GARMIN_TOKENS_JSON"]
          print(f"Raw secret length: {len(raw)} chars", file=sys.stderr)
          if not raw.strip():
              print("::error::GARMIN_TOKENS_JSON ar tom efter strip", file=sys.stderr)
              sys.exit(1)
          try:
              data = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f"::error::Secret ar inte giltig JSON: {e}", file=sys.stderr)
              print(f"First 80 chars: {raw[:80]!r}", file=sys.stderr)
              sys.exit(1)
          if not data.get("di_token") or not data.get("di_refresh_token"):
              print("::error::di_token eller di_refresh_token saknas i JSON", file=sys.stderr)
              print(f"Keys: {list(data.keys())}", file=sys.stderr)
              sys.exit(1)
          path = os.path.expanduser("~/.garminconnect/garmin_tokens.json")
          with open(path, "w", encoding="utf-8") as f:
              json.dump(data, f)
          size = os.path.getsize(path)
          print(f"Tokens skrivna till {path}: {size} bytes")
          print(f"  di_token: {len(data['di_token'])} chars")
          print(f"  di_refresh_token: {len(data['di_refresh_token'])} chars")
          PY

      - name: Run scheduled sync (cron)
        if: github.event_name == 'schedule'
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKEN_DIR: ~/.garminconnect
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
        # Slå samman till EN process — sync.py full loggar in en gång
        # och kör profile + activities + daily i samma session. Tidigare
        # körde vi activities + daily separat = 2 token-refresh per cron
        # vilket Garmin upplever som suspekt och invaliderar tokens snabbare.
        run: python sync.py full --activities 10 --days 1

      - name: Run manual sync (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKEN_DIR: ~/.garminconnect
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
        run: |
          SYNC_TYPE="${{ inputs.sync_type }}"
          DAYS="${{ inputs.days }}"
          LIMIT="${{ inputs.activities_limit }}"

          case "$SYNC_TYPE" in
            profile)
              python sync.py profile
              ;;
            activities)
              python sync.py activities --limit "$LIMIT"
              ;;
            daily)
              FROM=$(date -u -d "$DAYS days ago" +%Y-%m-%d)
              TO=$(date -u +%Y-%m-%d)
              python sync.py daily --from "$FROM" --to "$TO"
              ;;
            full)
              python sync.py full --activities "$LIMIT" --days "$DAYS"
              ;;
          esac
