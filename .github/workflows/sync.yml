name: Garmin Sync

on:
  # Manuell körning – syns som "Run workflow"-knapp i GitHub-appen
  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Vad ska synkas'
        type: choice
        required: true
        default: 'daily'
        options:
          - daily
          - activities
          - profile
          - full
      days:
        description: 'Antal dagar bakåt (för daily/full)'
        required: false
        default: '1'
      activities_limit:
        description: 'Antal aktiviteter (för activities/full)'
        required: false
        default: '20'

  # Schemalagd körning varje morgon 05:30 UTC = 06:30/07:30 svensk tid
  schedule:
    - cron: '30 5 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garmin-mcp

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: garmin-mcp/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Garmin OAuth tokens
        env:
          GARMIN_OAUTH1_TOKEN: ${{ secrets.GARMIN_OAUTH1_TOKEN }}
          GARMIN_OAUTH2_TOKEN: ${{ secrets.GARMIN_OAUTH2_TOKEN }}
        run: |
          set -e
          mkdir -p ~/.garminconnect

          if [ -z "$GARMIN_OAUTH1_TOKEN" ]; then
            echo "::error::GARMIN_OAUTH1_TOKEN saknas eller är tom"
            exit 1
          fi
          if [ -z "$GARMIN_OAUTH2_TOKEN" ]; then
            echo "::error::GARMIN_OAUTH2_TOKEN saknas eller är tom"
            exit 1
          fi

          # printf '%s' undviker echo:s trailing newline; tr rensar CR/LF/space
          # som kan ha smugit in från Windows-encodad secret
          printf '%s' "$GARMIN_OAUTH1_TOKEN" | tr -d '[:space:]' | base64 -d > ~/.garminconnect/oauth1_token.json
          printf '%s' "$GARMIN_OAUTH2_TOKEN" | tr -d '[:space:]' | base64 -d > ~/.garminconnect/oauth2_token.json
          chmod 600 ~/.garminconnect/oauth*.json

          # Validera att decoden gav giltig JSON
          python -c "import json; json.load(open('$HOME/.garminconnect/oauth1_token.json'))" \
            || { echo "::error::oauth1_token.json är inte giltig JSON efter decode"; exit 1; }
          python -c "import json; json.load(open('$HOME/.garminconnect/oauth2_token.json'))" \
            || { echo "::error::oauth2_token.json är inte giltig JSON efter decode"; exit 1; }

          echo "Tokens återställda och validerade."

      - name: Run scheduled sync (cron)
        if: github.event_name == 'schedule'
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKEN_DIR: ~/.garminconnect
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
        run: |
          YESTERDAY=$(date -u -d 'yesterday' +%Y-%m-%d)
          TODAY=$(date -u +%Y-%m-%d)
          python sync.py activities --limit 10
          python sync.py daily --from "$YESTERDAY" --to "$TODAY"

      - name: Run manual sync (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_TOKEN_DIR: ~/.garminconnect
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
        run: |
          SYNC_TYPE="${{ inputs.sync_type }}"
          DAYS="${{ inputs.days }}"
          LIMIT="${{ inputs.activities_limit }}"

          case "$SYNC_TYPE" in
            profile)
              python sync.py profile
              ;;
            activities)
              python sync.py activities --limit "$LIMIT"
              ;;
            daily)
              FROM=$(date -u -d "$DAYS days ago" +%Y-%m-%d)
              TO=$(date -u +%Y-%m-%d)
              python sync.py daily --from "$FROM" --to "$TO"
              ;;
            full)
              python sync.py full --activities "$LIMIT" --days "$DAYS"
              ;;
          esac
