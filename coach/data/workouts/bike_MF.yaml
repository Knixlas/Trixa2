# Cykelpass — Muskulär Styrka (MF)
#
# MF1 — Force Reps: korta intensiva intervaller med LÅG kadens (50-60 rpm)
#                   och hög watt. Rekryterar snabba muskelfibrer och
#                   bygger pedalkraft. Trainer eller långsam backe.
#
# MF2 — Hilly Ride: lång åktur i kuperad terräng. Naturligt varierande
#                   belastning i Z2-Z3 med Z4-spikar i backar. Bygger
#                   styrka under aerob bas.
#
# MF3 — Hill Repeats: upprepade backintervaller, 3-8 min per backe i Z4.
#                     Kombinerar styrka och tröskelarbete.

workouts:

  # ─────────────────────────────────────────────────────────────
  # MF1 — Force Reps
  # ─────────────────────────────────────────────────────────────

  - code: MF1_bike_01
    discipline: bike
    category: MF
    type_code: MF1
    name: "Force Reps — 8×30 sek låg kadens"
    phase_appropriate: [base_1, base_2, base_3]
    intent: |
      Låg-kadens-intervaller för att bygga pedalkraft. Kadensen är target
      — håll 50-60 rpm. Watt drivs upp av att du måste trycka hårdare per
      tramp eftersom du tar färre tramp per minut. Känn det i quads och
      glutes, INTE i knäna. Om knäna börjar gnälla: höj kadensen 5 rpm,
      sänk watt.
    setting: either
    terrain: flat
    erg_mode: true
    main_set:
      - segment: warmup
        duration_min: 15
        zone: 1
        erg_mode: false
        description: "Inkludera 2-3 stigningar mot Z2 för att aktivera benen"
      - segment: main
        sets: 8
        duration_min: 0.5
        zone: 4
        cadence_rpm: [50, 60]
        rest_sec: 90
        description: |
          Z4-watt vid 50-60 rpm. Aktiv vila i Z1 med naturlig kadens.
          Tunga växlar, satt i sadeln, fokus på rund pedaltramp.
      - segment: cooldown
        duration_min: 10
        zone: 1
        erg_mode: false
    total_duration_min:
      estimated: 45
      flexible_range: [40, 50]
    zone_refs: [Z1, Z4]
    equipment: [power_meter, hr_strap]
    abort_conditions:
      - "Smärta i knäleder → avbryt omedelbart, höj kadens vid nästa pass"
      - "Watt droppar > 15% mellan reps 1 och 8 → bryt resterande reps"
    coach_notes: |
      Klassiskt MF1-pass. Trainer rekommenderas (ERG ger exakt watt-kontroll
      vid låg kadens — utomhus blir det svårt att inte glida upp i kadens
      när det börjar svida). Utomhus kräver det en lång svag uppförsbacke.

  - code: MF1_bike_02
    discipline: bike
    category: MF
    type_code: MF1
    name: "Force Reps — 6×1 min stigande"
    phase_appropriate: [base_2, base_3, build_1]
    intent: |
      Längre force-reps med stegrande watt. Början av varje rep är på
      nedre Z4 — bygger till mitten/övre Z4 över 60 sekunder. Kadens
      ligger 55-65, något högre än 30-sek-varianten eftersom dosen är
      längre. Mer tröskelarbete än det första MF1-passet, men
      fortfarande styrke-fokus via låg kadens.
    setting: indoor
    requires_trainer: true
    erg_mode: true
    main_set:
      - segment: warmup
        duration_min: 15
        zone: 1
        erg_mode: false
      - segment: main
        sets: 6
        duration_min: 1
        effort_descriptor: "Stegrande Z4 — börja på nedre Z4 (≈95% FTP), avsluta mitten/övre Z4 (≈103% FTP). Kadens fast vid 55-65 rpm hela repet."
        cadence_rpm: [55, 65]
        rest_sec: 180
      - segment: cooldown
        duration_min: 10
        zone: 1
        erg_mode: false
    total_duration_min:
      estimated: 50
      flexible_range: [45, 55]
    zone_refs: [Z1, Z4]
    equipment: [power_meter, hr_strap, trainer]
    abort_conditions:
      - "Smärta i knäleder → avbryt"
      - "Kadens glider över 70 rpm vid maxwatt → repet räknas inte"
    coach_notes: |
      Effort_descriptor används pga stegringen — passet är inte fast
      watt-target. ERG-läge med "ramp" inom varje rep är idealt men kräver
      manuell utdesign i Garmin Connect; alternativt kör fast watt (97% FTP)
      hela repet.

  - code: MF1_bike_03
    discipline: bike
    category: MF
    type_code: MF1
    name: "Force Reps — backe utomhus"
    phase_appropriate: [base_2, base_3, build_1]
    intent: |
      Outdoor-variant av MF1. Hitta en lång svag uppförsbacke (3-6% lutning,
      3-5 min lång). Tramp upp i Z3-Z4-watt med medvetet låg kadens.
      Verklighetstrogen styrkeöverföring; sadelposition och bål-aktivering
      är realistiska.
    setting: outdoor
    terrain: hilly
    outdoor_only: true
    erg_mode: false
    main_set:
      - segment: warmup
        duration_min: 15
        zone: 1
        description: "Inkludera rullning till backens fot"
      - segment: main
        sets: 5
        duration_min: 3
        zone: 4
        cadence_rpm: [55, 65]
        rest_sec: 240
        description: |
          Upp i Z4-watt med kadens 55-65. Sitt kvar i sadeln (ingen stå-tramp,
          det är inte poängen). Nedrullning ger 4 min vila innan nästa rep.
      - segment: cooldown
        duration_min: 10
        zone: 1
    total_duration_min:
      estimated: 60
      flexible_range: [55, 75]
    zone_refs: [Z1, Z4]
    equipment: [power_meter, hr_strap]
    abort_conditions:
      - "Smärta i knäleder → avbryt"
      - "Kadens går upp över 75 trots ansträngning att hålla den nere → sänk watt eller välj brantare backe"
    coach_notes: |
      Mer realistisk styrkeöverföring än trainer-versionen — men kräver
      rätt backe. För Niklas i Stockholmsområdet: typ Skogås-backarna eller
      Vällingby-höjderna fungerar. Backens längd avgör vilken kadens som
      faktiskt går att hålla i Z4-watt.

  # ─────────────────────────────────────────────────────────────
  # MF2 — Hilly Ride
  # ─────────────────────────────────────────────────────────────

  - code: MF2_bike_01
    discipline: bike
    category: MF
    type_code: MF2
    name: "Hilly Ride — 90 min naturlig variation"
    phase_appropriate: [base_2, base_3, build_1, build_2]
    intent: |
      Lång åktur i kuperad terräng. Backarna sätter styrkebelastningen
      naturligt — du behöver inte räkna intervaller. Snitt-watt över passet
      hamnar i Z2-nedre Z3; enskilda backar når Z3-Z4. Du bygger styrka
      under aerob bas — två fluga i en smäll.
    setting: outdoor
    terrain: hilly
    outdoor_only: true
    erg_mode: false
    main_set:
      - segment: warmup
        duration_min: 15
        zone: 1
        description: "Platta partier om möjligt"
      - segment: continuous
        duration_min: 65
        zone: 2
        cadence_rpm: [75, 95]
        description: |
          Kupperad rutt med 5-10 backar (1-4 min styck). I backarna: tillåt
          watt att gå upp till Z3-Z4 och kadens ned mot 70-75. Mellan
          backar: lugn Z2 för återhämtning.
      - segment: cooldown
        duration_min: 10
        zone: 1
    total_duration_min:
      estimated: 90
      flexible_range: [75, 110]
    zone_refs: [Z1, Z2, Z3, Z4]
    equipment: [power_meter, hr_strap]
    abort_conditions:
      - "Backar tvingar Z5 upprepade gånger → välj plattare rutt eller sänk watt-tak"
    coach_notes: |
      Bättre verkligheten än indoor MF1 — naturlig variation i kadens, hr,
      watt. För adepter med tillgång till bra terräng (Stockholm:
      Lidingö-loop, Värmdö). Tävlingsbanor som Kalmar är platta så denna är
      inte tävlingsspecifik, men styrkeadaptionen överförs.

  - code: MF2_bike_02
    discipline: bike
    category: MF
    type_code: MF2
    name: "Hilly Ride — 2 tim med pure climbing block"
    phase_appropriate: [base_3, build_1, build_2]
    intent: |
      Lång kuperad åktur med inbäddat 30-min styrkeblock i kuperad terräng.
      Första timmen är vanlig MF2 — uppvärmning. Andra timmen letar du
      backarna och kör dem hårdare; sista 30 min lugnar du ned. Mental
      övning lika mycket som fysisk: hur trycker du på i backe 5 av 8?
    setting: outdoor
    terrain: hilly
    outdoor_only: true
    erg_mode: false
    main_set:
      - segment: warmup
        duration_min: 15
        zone: 1
      - segment: continuous
        duration_min: 45
        zone: 2
        cadence_rpm: [80, 95]
        description: "Aerobt bas i kuperat — backarna får drifta upp till Z3"
      - segment: main
        duration_min: 30
        effort_descriptor: "Z3 i snitt med Z4-spikar i backarna. Hitta 4-6 backar på 1-3 min styck — tryck på."
        cadence_rpm: [70, 90]
        description: "Block där du jagar backarna istället för att rulla över dem"
      - segment: continuous
        duration_min: 20
        zone: 2
        cadence_rpm: [85, 95]
        description: "Aktiv nedvarvning, plattare partier"
      - segment: cooldown
        duration_min: 10
        zone: 1
    total_duration_min:
      estimated: 120
      flexible_range: [110, 140]
    zone_refs: [Z1, Z2, Z3, Z4]
    equipment: [power_meter, hr_strap]
    abort_conditions:
      - "Snitt-watt i 30-min-blocket faller > 10% mot sista 10 min → bryt blocket tidigt, fortsätt i Z2"
    coach_notes: |
      För adepter som redan har MF2_bike_01 inkört. Stoppat block tvingar
      fram styrke-fokus tydligare än bara "kupperad rutt". Bra build_1-pass.

  # ─────────────────────────────────────────────────────────────
  # MF3 — Hill Repeats
  # ─────────────────────────────────────────────────────────────

  - code: MF3_bike_01
    discipline: bike
    category: MF
    type_code: MF3
    name: "Hill Repeats — 5×4 min Z4"
    phase_appropriate: [base_3, build_1, build_2]
    intent: |
      Upprepade backintervaller. Hitta en backe som tar ca 4 min att klättra
      (typiskt 1-1.5 km, 4-7% snitt). Tramp upp i tröskel-watt (mitten Z4).
      Kombinerar muskelstyrka (backens lutning) med tröskelarbete (Z4-tiden).
      Mycket effektivt — ett av de bästa cykelpassen för IM-build.
    setting: outdoor
    terrain: hilly
    outdoor_only: true
    erg_mode: false
    main_set:
      - segment: warmup
        duration_min: 15
        zone: 1
        description: "Inkludera rullning till backens fot; lägg in 2 min Z2 mot slutet"
      - segment: main
        sets: 5
        duration_min: 4
        zone: 4
        cadence_rpm: [70, 85]
        rest_sec: 300
        description: |
          Mitten av Z4 (≈100% FTP). Kadens får drifta ned mot 70 om backen
          är brant. Sitt kvar i sadeln så mycket som möjligt. Aktiv vila:
          rulla ned + lugn återhämtning innan nästa rep.
      - segment: cooldown
        duration_min: 10
        zone: 1
    total_duration_min:
      estimated: 75
      flexible_range: [70, 90]
    zone_refs: [Z1, Z4]
    equipment: [power_meter, hr_strap]
    abort_conditions:
      - "Watt i rep 4-5 faller > 15% från rep 1 → bryt resterande reps"
      - "Bakgrundspuls inte återhämtad till Z2 inom 4 min mellan reps → vila längre eller bryt"
    coach_notes: |
      MF3 är ME-träning i förklädnad — backens lutning lägger på styrke-
      momentum. Bra för adepter som behöver bygga både kraft och tröskel
      utan att dubblera pass. Kräver rätt backe; för Niklas funkar t.ex.
      Skogås- eller Hellasgården-backar.

  - code: MF3_bike_02
    discipline: bike
    category: MF
    type_code: MF3
    name: "Hill Repeats — 8×3 min stå/sitt"
    phase_appropriate: [build_1, build_2]
    intent: |
      Hill repeats med medveten växling mellan sittande och stående tramp.
      Bygger både muskeluthållighet och teknisk skicklighet — IM-cykling
      kräver att man ibland står upp för att avlasta sätet/ryggen.
      Sittande är primärt; stå-segment 20-30 sek/rep.
    setting: outdoor
    terrain: hilly
    outdoor_only: true
    erg_mode: false
    main_set:
      - segment: warmup
        duration_min: 15
        zone: 1
      - segment: main
        sets: 8
        duration_min: 3
        zone: 4
        cadence_rpm: [70, 90]
        rest_sec: 240
        description: |
          Z4-watt (nedre-mitten Z4). 2 × 30 sek stående tramp insprängt i
          varje rep — t.ex. 30 sek sitt, 30 sek stå, 60 sek sitt, 30 sek stå,
          30 sek sitt. Watt jämn över repet trots växlingen.
      - segment: cooldown
        duration_min: 10
        zone: 1
    total_duration_min:
      estimated: 80
      flexible_range: [75, 95]
    zone_refs: [Z1, Z4]
    equipment: [power_meter, hr_strap]
    abort_conditions:
      - "Ryggsmärta vid sittande tramp → byt till AE2 utan backar"
      - "Watt-spik > Z5 vid stående → för stor kraftutveckling, lugnare"
    coach_notes: |
      Kombinerar MF3 med teknisk variation. Bra för adepter som redan har
      MF3_bike_01 inkört och behöver progression. För Niklas: passa stå-tramp
      med fysio om ryggrehab fortfarande är aktuell.

  - code: MF3_bike_03
    discipline: bike
    category: MF
    type_code: MF3
    name: "Hill Repeats — long climbs 3×8 min Z3-Z4"
    phase_appropriate: [build_1, build_2]
    intent: |
      Längre backe-intervaller på övre Z3 / nedre Z4 (sweet spot på backe).
      Bygger upp förmågan att hålla under-tröskel-watt på 6-8% lutning
      under lång tid — översätter direkt till brant terräng i tävling.
      Vid längre backe är mental kontroll av watt avgörande; det är lätt
      att rusa iväg de första 2 minuterna.
    setting: outdoor
    terrain: hilly
    outdoor_only: true
    erg_mode: false
    main_set:
      - segment: warmup
        duration_min: 15
        zone: 1
      - segment: main
        sets: 3
        duration_min: 8
        effort_descriptor: "Sweet Spot — 88-93% FTP (övre Z3 / nedre Z4) i backe. Lås watt-target och håll. Andning kontrollerad, samtal i korta meningar."
        cadence_rpm: [70, 85]
        rest_sec: 360
        description: "Aktiv vila: rulla ned + 2-3 min platt Z1-Z2 innan nästa rep"
      - segment: cooldown
        duration_min: 10
        zone: 1
    total_duration_min:
      estimated: 75
      flexible_range: [70, 90]
    zone_refs: [Z1, Z2, Z3, Z4]
    equipment: [power_meter, hr_strap]
    abort_conditions:
      - "Snitt-watt rep 3 faller > 10% från rep 1 → bryt resterande reps"
    coach_notes: |
      Mer aerobt än MF3_bike_01 (Sweet Spot vs ren tröskel). Bra "stark
      build_2-pass" som inte är fullt tröskelarbete men tar styrke-dosen.
      Kräver lång backe (minst 2 km) — i Stockholm svårare att hitta;
      alternativ: ramp på trainer (men då tappar man backe-realismen).
